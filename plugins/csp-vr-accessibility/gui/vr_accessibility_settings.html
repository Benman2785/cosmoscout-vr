<!-- VIEW PITCH OFFSET -->

<div class="row mt-2">
  <div class="col-12">
    <div class="d-flex align-items-center justify-content-between">
      <label class="mb-0">Icaros Pitch Offset</label>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" 
               data-callback="viewOffset.setEnabled">
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-12">
    <label class="text-muted small">Neigungswinkel (Grad)</label>
    <div data-callback="viewOffset.setPitch" 
         data-min="-90" data-max="90" data-step="1" class="simple-slider">
    </div>
  </div>
</div>
<hr>

<!-- MOTION POINTS -->

<hr class="my-3">

<div class="row">
    <div class="col-5">
        <label class="checklabel">
            <input type="checkbox" data-callback="motionPoints.setEnabled" />
            <i class="material-icons"></i>
            <span>Motion Points</span>
        </label>
    </div>
</div>

<div class="row">
    <div class="col-5">Point Count</div>
    <div class="col-7">
        <div data-callback="motionPoints.setCount"></div>
    </div>
</div>

<div class="row">
    <div class="col-5">Radius</div>
    <div class="col-7">
        <div data-callback="motionPoints.setRadius"></div>
    </div>
</div>

<div class="row">
    <div class="col-5">Point Size</div>
    <div class="col-7">
        <div data-callback="motionPoints.setSize"></div>
    </div>
</div>

<div class="row">
    <div class="col-5">Color</div>
    <div class="col-7">
        <input type="text" class="form-control color-input" id="motionPoints-setColor" style="color: white;" value="" />
    </div>
</div>
